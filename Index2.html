<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workstation - ระบบบันทึกรายกะ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'Inter', sans-serif;
      background: #f1f5f9;
      padding: 15px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* Header */
    .nav-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .btn-back {
      background: white;
      border: 1px solid #ddd;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: #1e3a8a;
      font-weight: bold;
    }

    /* User Bar */
    .user-bar {
      background: white;
      padding: 12px 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .user-info small {
      color: #666;
      font-size: 12px;
    }

    .user-info b {
      font-size: 16px;
    }

    /* Cards */
    .summary-card {
      background: #1e3a8a;
      color: white;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 15px;
      position: relative;
    }

    .shift-tag {
      position: absolute;
      top: 10px;
      right: 15px;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }

    .total-all-card {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      padding: 15px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 15px;
    }

    .total-all-card .amount {
      font-size: 28px;
      font-weight: bold;
      margin-top: 5px;
    }

    /* Input */
    .input-box {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .input-box input {
      width: 100%;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 15px;
      font-size: 28px;
      text-align: center;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .input-box input:focus {
      outline: none;
      border-color: #059669;
    }

    .btn-save {
      width: 100%;
      background: #059669;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-close-shift {
      width: 100%;
      background: transparent;
      color: #be123c;
      border: 1.5px solid #be123c;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-print {
      width: 100%;
      background: #475569;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    /* History List */
    .section-title {
      display: flex;
      justify-content: space-between;
      margin: 15px 0 10px 0;
      font-weight: bold;
    }

    .badge {
      background: #e2e8f0;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
    }

    .history-item {
      background: white;
      padding: 10px 15px;
      margin-bottom: 5px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-info {
      display: flex;
      gap: 15px;
      align-items: baseline;
    }

    .history-time {
      font-size: 14px;
      color: #666;
      min-width: 65px;
    }

    .history-amount {
      font-size: 16px;
      font-weight: bold;
      color: #1e3a8a;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
    }

    .edit-btn { 
      color: #d97706; 
    }

    .edit-btn:hover { 
      background: #fef3c7; 
    }

    .delete-btn { 
      color: #be123c; 
    }

    .delete-btn:hover { 
      background: #fee2e2; 
    }

    /* Shift Summary */
    .shift-summary {
      background: white;
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .shift-header {
      background: #f8fafc;
      padding: 12px 15px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      border-bottom: 1px solid #e2e8f0;
    }

    .shift-details {
      padding: 10px;
    }

    .shift-record {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }

    .shift-total {
      background: #f0fdf4;
      padding: 8px 10px;
      font-weight: bold;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      border-radius: 8px;
    }

    .collapse-icon {
      font-size: 12px;
      transition: transform 0.2s;
    }

    .collapsed .shift-details {
      display: none;
    }

    .collapsed .collapse-icon {
      transform: rotate(-90deg);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 20px;
      width: 320px;
      max-width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: modalFadeIn 0.2s ease;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-content h3 {
      margin-bottom: 20px;
      color: #1e3a8a;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .modal-content input:focus {
      outline: none;
      border-color: #059669;
    }

    .time-hint {
      font-size: 11px;
      color: #666;
      margin-top: -12px;
      margin-bottom: 15px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
    }

    .modal-buttons button:active {
      transform: scale(0.98);
    }

    .btn-confirm {
      background: #059669;
      color: white;
    }

    .btn-confirm:hover {
      background: #047857;
    }

    .btn-cancel {
      background: #e2e8f0;
      color: #475569;
    }

    .btn-cancel:hover {
      background: #cbd5e1;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 20px;
    }

    /* Print Styles */
    @media print {
      @page {
        size: A4;
        margin: 1.5cm;
      }
      
      body * {
        visibility: hidden;
      }
      
      #printArea, #printArea * {
        visibility: visible;
      }
      
      #printArea {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 0;
        font-family: 'Sarabun', 'Courier New', monospace;
        background: white;
      }
      
      .print-report {
        max-width: 100%;
        margin: 0 auto;
        padding: 0;
      }
      
      .print-header {
        text-align: center;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #000;
      }
      
      .print-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      
      .print-subtitle {
        font-size: 14px;
        margin-bottom: 5px;
        line-height: 1.4;
      }
      
      .print-shift {
        margin-bottom: 15px;
        page-break-inside: avoid;
        break-inside: avoid;
      }
      
      .print-shift-title {
        font-weight: bold;
        font-size: 14px;
        margin-bottom: 8px;
        padding-bottom: 5px;
        border-bottom: 1px dashed #000;
        display: flex;
        justify-content: space-between;
      }
      
      .print-item {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 13px;
        line-height: 1.3;
      }
      
      .print-divider {
        border-top: 1px dashed #000;
        margin: 6px 0;
      }
      
      .print-grand-total {
        display: flex;
        justify-content: space-between;
        font-weight: bold;
        font-size: 15px;
        margin-top: 15px;
        padding-top: 8px;
        border-top: 2px solid #000;
      }
      
      .print-footer {
        text-align: center;
        font-size: 12px;
        margin-top: 20px;
        padding-bottom: 0;
      }
    }

    #printArea {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="nav-header">
    <a href="Index1.html" class="btn-back">🏠 กลับหน้าหลัก</a>
  </div>

  <div class="user-bar">
    <div class="user-info">
      <small>พนักงาน:</small><br>
      <b id="displayUserName">กำลังโหลด...</b>
    </div>
    <button onclick="editName()" style="background:#f8fafc; border:1px solid #ddd; padding:5px 12px; border-radius:8px; cursor:pointer;">✏️ แก้ไขชื่อ</button>
  </div>
  
  <div class="summary-card">
    <div class="shift-tag" id="shiftDisplay">กะที่ -</div>
    <div style="font-size: 13px; opacity: 0.9;">ยอดรวมสะสมกะปัจจุบัน</div>
    <div id="displayTotal" style="font-size: 40px; font-weight: bold;">0</div>
  </div>

  <div class="total-all-card">
    <small>💰 ยอดรวมสุทธิทั้งหมด (ทุกกะ)</small>
    <div class="amount" id="totalAllAmount">0</div>
  </div>

  <div class="input-box">
    <input type="text" id="amountInput" placeholder="0" inputmode="numeric">
    <button class="btn-save" id="btnSave">บันทึกยอดโอน</button>
    <button class="btn-close-shift" onclick="confirmCloseShift()">🚩 ปิดกะการทำงานนี้</button>
    <button class="btn-print" onclick="printReport()">🖨️ พิมพ์รายงาน</button>
  </div>

  <div class="section-title">
    <span>📋 ประวัติรายการกะนี้ (กะที่ <span id="currentShiftNum">-</span>)</span>
    <span class="badge" id="recordCount">0 รายการ</span>
  </div>
  <div id="list"></div>

  <div class="section-title">
    <span>📊 สรุปยอดแยกตามกะ</span>
  </div>
  <div id="shiftSummaryContainer"></div>
</div>

<!-- Print Area -->
<div id="printArea">
  <div class="print-report">
    <div class="print-header">
      <div class="print-title">รายงานสรุปยอดโอน</div>
      <div class="print-subtitle">ชื่อพนักงาน: <span id="printUserName"></span></div>
      <div class="print-subtitle">วันที่: <span id="printDate"></span></div>
    </div>
    
    <div id="printShiftDetails"></div>
    
    <div class="print-grand-total">
      <span>รวมสุทธิทั้งหมด</span>
      <span id="printGrandTotal">0</span>
    </div>
    
    <div class="print-footer">
      ________________________________
    </div>
  </div>
</div>

<!-- Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>✏️ แก้ไขรายการ</h3>
    <input type="text" id="editTime" placeholder="เช่น 16.00 หรือ 1600">
    <div class="time-hint">💡 กรอกได้ทั้ง 16.00 / 1600 / 16:00</div>
    <input type="text" id="editAmount" placeholder="จำนวนเงิน" inputmode="numeric">
    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-confirm" onclick="saveEdit()">บันทึก</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, deleteDoc, query, where, onSnapshot, Timestamp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBtyAkkQVjZmNc2tvqN5GXQ9hKpcfEc4e0",
    authDomain: "calculation-program-409b9.firebaseapp.com",
    projectId: "calculation-program-409b9",
    storageBucket: "calculation-program-409b9.firebasestorage.app",
    messagingSenderId: "853222250185",
    appId: "1:853222250185:web:dfb00b595ff88f48bb9f18"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const urlParams = new URLSearchParams(window.location.search);
  const empId = urlParams.get('empId'); 
  let currentShift = 1;
  let unsubscribeHistory = null;
  let editingDocId = null;
  let allShiftsData = {};

  if (!empId) {
    window.location.href = 'Index1.html';
  }

  function restrictToNumbers(inputElement) {
    inputElement.addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '');
    });
  }

  function parseTimeInput(timeStr) {
    if (!timeStr) return null;
    timeStr = timeStr.trim();
    let hours = 0, minutes = 0;
    
    if (timeStr.includes('.')) {
      let parts = timeStr.split('.');
      hours = parseInt(parts[0]);
      minutes = parseInt(parts[1]);
    }
    else if (timeStr.includes(':')) {
      let parts = timeStr.split(':');
      hours = parseInt(parts[0]);
      minutes = parseInt(parts[1]);
    }
    else if (timeStr.length >= 3) {
      if (timeStr.length === 3) {
        hours = parseInt(timeStr.substring(0, 1));
        minutes = parseInt(timeStr.substring(1, 3));
      } else if (timeStr.length === 4) {
        hours = parseInt(timeStr.substring(0, 2));
        minutes = parseInt(timeStr.substring(2, 4));
      } else {
        return null;
      }
    }
    else {
      return null;
    }
    
    if (isNaN(hours) || isNaN(minutes) || hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
      return null;
    }
    return { hours, minutes };
  }

  function formatTimeDisplay(hours, minutes) {
    return `${hours.toString().padStart(2, '0')}.${minutes.toString().padStart(2, '0')}`;
  }

  async function init() {
    try {
      const docRef = doc(db, "employees", empId);
      const docSnap = await getDoc(docRef);
      
      if (docSnap.exists()) {
        const data = docSnap.data();
        currentShift = data.currentShift || 1;
        document.getElementById('displayUserName').innerText = data.name;
        document.getElementById('shiftDisplay').innerText = `กะที่ ${currentShift}`;
        document.getElementById('currentShiftNum').innerText = currentShift;
        loadData();
        loadAllShiftsSummary();
      } else {
        document.getElementById('displayUserName').innerText = "พนักงานใหม่";
        document.getElementById('shiftDisplay').innerText = `กะที่ 1`;
        document.getElementById('currentShiftNum').innerText = "1";
        currentShift = 1;
        loadData();
        loadAllShiftsSummary();
      }
    } catch (error) {
      console.error("Error:", error);
    }
  }

  window.editName = async () => {
    const newName = prompt("พิมพ์ชื่อใหม่:", document.getElementById('displayUserName').innerText);
    if (newName && newName.trim()) {
      try {
        await setDoc(doc(db, "employees", empId), { name: newName, currentShift: currentShift }, { merge: true });
        document.getElementById('displayUserName').innerText = newName;
        alert("บันทึกเรียบร้อย");
      } catch (error) {
        alert("Error: " + error.message);
      }
    }
  };

  async function saveData() {
    const amt = document.getElementById('amountInput').value;
    const currentName = document.getElementById('displayUserName').innerText;
    
    if (!amt || parseInt(amt) <= 0) {
      alert("กรุณากรอกจำนวนเงิน");
      return;
    }
    
    const btnSave = document.getElementById('btnSave');
    btnSave.disabled = true;
    btnSave.textContent = "กำลังบันทึก...";
    
    try {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      
      await setDoc(doc(collection(db, "employees", empId, "history")), {
        name: currentName,
        income: parseInt(amt),
        shiftNum: currentShift,
        timestamp: Timestamp.fromDate(now),
        createdAt: now.toISOString(),
        hours: hours,
        minutes: minutes,
        timeString: formatTimeDisplay(hours, minutes)
      });
      
      document.getElementById('amountInput').value = "";
    } catch (error) {
      alert("Error: " + error.message);
    } finally {
      btnSave.disabled = false;
      btnSave.textContent = "บันทึกยอดโอน";
    }
  }

  window.editRecord = (docId, currentAmount, currentHours, currentMinutes) => {
    editingDocId = docId;
    document.getElementById('editAmount').value = currentAmount;
    document.getElementById('editTime').value = formatTimeDisplay(currentHours, currentMinutes);
    document.getElementById('editModal').style.display = 'flex';
    restrictToNumbers(document.getElementById('editAmount'));
    
    // ป้องกันการ scroll ด้านหลัง
    document.body.style.overflow = 'hidden';
  };

  window.saveEdit = async () => {
    const newAmount = document.getElementById('editAmount').value;
    const newTimeStr = document.getElementById('editTime').value;
    
    if (!newAmount || parseInt(newAmount) <= 0) {
      alert("กรุณากรอกจำนวนเงิน");
      return;
    }
    
    const parsedTime = parseTimeInput(newTimeStr);
    if (!parsedTime) {
      alert("กรุณากรอกเวลาให้ถูกต้อง");
      return;
    }
    
    try {
      const { hours, minutes } = parsedTime;
      const now = new Date();
      now.setHours(hours, minutes, 0);
      
      await updateDoc(doc(db, "employees", empId, "history", editingDocId), {
        income: parseInt(newAmount),
        timestamp: Timestamp.fromDate(now),
        createdAt: now.toISOString(),
        hours: hours,
        minutes: minutes,
        timeString: formatTimeDisplay(hours, minutes)
      });
      
      alert("แก้ไขเรียบร้อย");
      closeModal();
    } catch (error) {
      alert("Error: " + error.message);
    }
  };

  window.deleteRecord = async (docId) => {
    if (confirm("ลบรายการนี้?")) {
      try {
        await deleteDoc(doc(db, "employees", empId, "history", docId));
        alert("ลบเรียบร้อย");
      } catch (error) {
        alert("Error: " + error.message);
      }
    }
  };

  window.closeModal = () => {
    document.getElementById('editModal').style.display = 'none';
    editingDocId = null;
    document.body.style.overflow = ''; // คืนค่า scroll
  };

  window.toggleShift = (shiftNum) => {
    const el = document.getElementById(`shift-${shiftNum}`);
    if (el) el.classList.toggle('collapsed');
  };

  function loadData() {
    if (unsubscribeHistory) unsubscribeHistory();
    
    const q = query(collection(db, "employees", empId, "history"), where("shiftNum", "==", currentShift));
    
    unsubscribeHistory = onSnapshot(q, (snap) => {
      let html = "", total = 0, count = 0;
      let records = [];
      
      snap.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
      records.sort((a, b) => ((b.hours * 60) + (b.minutes || 0)) - ((a.hours * 60) + (a.minutes || 0)));
      
      if (records.length === 0) {
        html = "<div class='loading'>ยังไม่มีรายการในกะนี้</div>";
      } else {
        records.forEach(r => {
          total += r.income || 0;
          count++;
          html += `
            <div class="history-item">
              <div class="history-info">
                <span class="history-time">${r.timeString || '--:--'} น.</span>
                <span class="history-amount">${(r.income || 0).toLocaleString()} บาท</span>
              </div>
              <div class="history-actions">
                <button class="edit-btn" onclick="editRecord('${r.id}', ${r.income}, ${r.hours}, ${r.minutes})">✏️ แก้ไข</button>
                <button class="delete-btn" onclick="deleteRecord('${r.id}')">🗑️ ลบ</button>
              </div>
            </div>`;
        });
      }
      
      document.getElementById('list').innerHTML = html;
      document.getElementById('displayTotal').innerText = total.toLocaleString();
      document.getElementById('recordCount').innerText = count + " รายการ";
    });
  }

  function loadAllShiftsSummary() {
    const q = query(collection(db, "employees", empId, "history"));
    
    onSnapshot(q, (snap) => {
      const shiftsTotal = {};
      let grandTotal = 0;
      
      snap.forEach(doc => {
        const data = doc.data();
        const shiftNum = data.shiftNum;
        const income = data.income || 0;
        
        if (!shiftsTotal[shiftNum]) shiftsTotal[shiftNum] = { total: 0, records: [] };
        shiftsTotal[shiftNum].total += income;
        shiftsTotal[shiftNum].records.push({
          income: income,
          timeString: data.timeString,
          hours: data.hours,
          minutes: data.minutes
        });
        grandTotal += income;
      });
      
      allShiftsData = shiftsTotal;
      document.getElementById('totalAllAmount').innerText = grandTotal.toLocaleString();
      
      const sortedShifts = Object.keys(shiftsTotal).sort((a, b) => Number(b) - Number(a));
      
      if (sortedShifts.length === 0) {
        document.getElementById('shiftSummaryContainer').innerHTML = '<div class="loading">ยังไม่มีข้อมูล</div>';
        return;
      }
      
      let summaryHtml = '';
      sortedShifts.forEach(shiftNum => {
        const data = shiftsTotal[shiftNum];
        const isCurrent = (Number(shiftNum) === currentShift);
        const sortedRecords = [...data.records].sort((a, b) => 
          ((a.hours * 60) + (a.minutes || 0)) - ((b.hours * 60) + (b.minutes || 0))
        );
        
        summaryHtml += `
          <div class="shift-summary ${isCurrent ? '' : 'collapsed'}" id="shift-${shiftNum}">
            <div class="shift-header" onclick="toggleShift(${shiftNum})">
              <span>📌 กะที่ ${shiftNum} ${isCurrent ? '(ปัจจุบัน)' : ''}</span>
              <div style="display: flex; gap: 15px; align-items: center;">
                <span style="color: #059669;">${data.total.toLocaleString()} บาท</span>
                <span class="collapse-icon">▼</span>
              </div>
            </div>
            <div class="shift-details">
              ${sortedRecords.map(r => `
                <div class="shift-record">
                  <span>${r.timeString || '--:--'} น.</span>
                  <span>${r.income.toLocaleString()} บาท</span>
                </div>
              `).join('')}
              <div class="shift-total">
                <span>รวมทั้งสิ้น</span>
                <span>${data.total.toLocaleString()} บาท</span>
              </div>
            </div>
          </div>`;
      });
      
      document.getElementById('shiftSummaryContainer').innerHTML = summaryHtml;
    });
  }

  window.printReport = () => {
    if (Object.keys(allShiftsData).length === 0) {
      alert("ไม่มีข้อมูลสำหรับการพิมพ์");
      return;
    }
    
    document.getElementById('printUserName').innerText = document.getElementById('displayUserName').innerText;
    document.getElementById('printGrandTotal').innerText = document.getElementById('totalAllAmount').innerText + " บาท";
    
    const now = new Date();
    const day = now.getDate();
    const month = now.getMonth() + 1;
    const year = now.getFullYear() + 543;
    document.getElementById('printDate').innerText = `${day}/${month}/${year}`;
    
    let html = '';
    const sortedShifts = Object.keys(allShiftsData).sort((a, b) => Number(a) - Number(b));
    
    for (const shiftNum of sortedShifts) {
      const data = allShiftsData[shiftNum];
      const sortedRecords = [...data.records].sort((a, b) => 
        ((a.hours * 60) + (a.minutes || 0)) - ((b.hours * 60) + (b.minutes || 0))
      );
      
      html += `
        <div class="print-shift">
          <div class="print-shift-title">
            <span>กะที่ ${shiftNum}</span>
            <span>${data.total.toLocaleString()} บาท</span>
          </div>
      `;
      
      for (const r of sortedRecords) {
        html += `
          <div class="print-item">
            <span>${r.timeString || '--:--'} น.</span>
            <span>${r.income.toLocaleString()} บาท</span>
          </div>
        `;
      }
      
      html += `
          <div class="print-divider"></div>
        </div>
      `;
    }
    
    document.getElementById('printShiftDetails').innerHTML = html;
    
    setTimeout(() => {
      const printArea = document.getElementById('printArea');
      printArea.style.display = 'block';
      window.print();
      setTimeout(() => {
        printArea.style.display = 'none';
      }, 500);
    }, 100);
  };

  window.confirmCloseShift = async () => {
    if (confirm(`ปิดกะที่ ${currentShift}?`)) {
      try {
        await setDoc(doc(db, "employees", empId), { currentShift: currentShift + 1 }, { merge: true });
        alert(`ปิดกะ ${currentShift} เรียบร้อย`);
        location.reload();
      } catch (error) {
        alert("Error: " + error.message);
      }
    }
  };

  restrictToNumbers(document.getElementById('amountInput'));
  document.getElementById('btnSave').onclick = saveData;
  document.getElementById('amountInput').onkeypress = (e) => { if(e.key === "Enter") saveData(); };
  
  // ไม่มี event คลิกนอก modal
  init();
</script>
</body>
</html>
